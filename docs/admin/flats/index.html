<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flats &amp; Residents | Savitry Greens - Tower 15 Residents</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  
    <link rel="stylesheet" href="/SavitryGreen.T15.Residents/css/custom.css">
</head>

<body class="bg-light">

  
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Savitry Greens – Tower 15</a>
    </div>
  </nav>

  
  <main class="container">
    

<h1 class="mb-4 text-center">Flats Directory</h1>




<div class="table-responsive">
<table class="table table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>Flat</th>
            <th>Floor</th>
            <th>Tower</th>
            <th class="text-center">Actions</th>
        </tr>
    </thead>

    <tbody id="flats-body">
        <tr><td colspan="4" class="p-4 text-center">Loading flats...</td></tr>
    </tbody>
</table>
</div>





<template id="tpl-flat-row">
<tr>
    <td class="col-flat-no fw-bold"></td>
    <td class="col-floor"></td>
    <td class="col-tower"></td>
    <td class="text-center">
        <button class="btn btn-sm btn-primary btn-view">View</button>
    </td>
</tr>
</template>





<template id="tpl-detail-row">
<tr class="details-row bg-light d-none">
    <td colspan="4">
        <div class="p-3 detail-container">Loading...</div>
    </td>
</tr>
</template>





<template id="tpl-detail-container">
<div class="detail-root">

    
    <h5 class="detail-flat-title"></h5>

    
    <p><strong>Floor:</strong> <span class="detail-floor"></span></p>
    <p><strong>Tower:</strong> <span class="detail-tower"></span></p>

    <hr>

    
    <h6>Residents</h6>
    <ul class="list-group mb-3 detail-residents"></ul>

    <hr>

    
    <h6>Maintenance (Last 6 Months)</h6>

    <div class="table-responsive">
    <table class="table table-sm table-bordered">
        <thead class="table-secondary">
            <tr>
                <th>Month</th>
                <th>Status</th>
                <th>Paid On</th>
                <th>Amount</th>
                <th>Mode</th>
            </tr>
        </thead>
        <tbody class="detail-payments"></tbody>
    </table>
    </div>

</div>
</template>





<template id="tpl-resident-item">
<li class="list-group-item">
    <strong class="resident-type"></strong>:
    <span class="resident-name"></span><br>
    📞 <a class="resident-phone"></a><br>
    ✉️ <a class="resident-email"></a>
</li>
</template>





<template id="tpl-payment-row">
<tr>
    <td class="pay-month"></td>
    <td class="pay-status"></td>
    <td class="pay-paidon"></td>
    <td class="pay-amount"></td>
    <td class="pay-mode"></td>
</tr>
</template>





<template id="tpl-no-data">
<p class="text-muted">No data available</p>
</template>

</script>
