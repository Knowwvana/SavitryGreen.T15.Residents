<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
        <!-- Navigation Tracker & Title -->
        <div>
            <h2 class="fw-bold mb-0 text-dark" style="font-size: 1.5rem;">
                {{ if .IsHome }}Dashboard{{ else }}{{ .Title }}{{ end }}
            </h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0" style="font-size: 0.85rem;">
                    <li class="breadcrumb-item text-muted">Main</li>
                    <li class="breadcrumb-item active text-primary" aria-current="page">
                        {{ if .IsHome }}Dashboard{{ else }}{{ .Title }}{{ end }}
                    </li>
                </ol>
            </nav>
        </div>

        <span class="date-badge ms-3">
            <span x-text="currentDate"></span>
        </span>
    </div>

    <!-- Actions -->
    <div class="d-flex align-items-center gap-4">
        <a href="#" class="text-decoration-none d-flex align-items-center gap-2 text-primary fw-medium" style="font-size: 0.9rem;">
            <i class="bi bi-question-circle-fill"></i> Help / Tour
        </a>
        
        <button class="header-icon-btn">
            <i class="bi bi-bell-fill"></i>
            <span class="notification-dot"></span>
        </button>

        <button class="btn btn-primary fw-medium px-4 py-2 d-flex align-items-center gap-2 shadow-sm" style="background-color: #2563eb; border-color: #2563eb;">
            <i class="bi bi-plus-lg"></i> New Entry
        </button>
    </div>
</div>
