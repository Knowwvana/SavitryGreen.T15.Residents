{{ define "main" }}

<div x-data="dashboardController()" class="container-fluid px-0 page-animate">
    
    <!-- HERO BANNER -->
    <div class="hero-banner mb-4">
        <div class="row">
            <div class="col-md-9">
                <h1 class="display-6 fw-bold mb-2">{{ .Site.Params.society_name }}</h1>
                <p class="text-light opacity-75 mb-4 d-flex align-items-center gap-2">
                    <i class="bi bi-geo-alt-fill"></i> {{ .Site.Params.society_address }}
                </p>
                
                <div class="d-flex gap-3">
                    <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 10px; min-width: 120px;">
                        <small class="text-uppercase text-white-50 fw-bold" style="font-size: 0.7rem; letter-spacing: 0.5px;">Total Flats</small>
                        <div class="h4 fw-bold mb-0 mt-1">9</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 10px; min-width: 120px;">
                        <small class="text-uppercase text-white-50 fw-bold" style="font-size: 0.7rem; letter-spacing: 0.5px;">Occupancy</small>
                        <div class="h4 fw-bold mb-0 mt-1">100%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- STATS GRID -->
    <div class="row g-4">
        <!-- Collected -->
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between mb-3">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.75rem;">Total Collected</small>
                    <div class="icon-circle bg-green-soft"><i class="bi bi-cash-stack"></i></div>
                </div>
                <h2 class="fw-bold mb-0">₹<span x-text="stats.collected"></span></h2>
                <small class="text-success fw-bold mt-3 d-flex align-items-center gap-1" style="font-size: 0.85rem;">
                    <i class="bi bi-graph-up-arrow"></i> +12% vs last month
                </small>
            </div>
        </div>
        
        <!-- Pending Dues -->
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between mb-3">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.75rem;">Pending Dues</small>
                    <div class="icon-circle bg-red-soft"><i class="bi bi-exclamation-triangle-fill"></i></div>
                </div>
                <h2 class="fw-bold mb-0">₹<span x-text="stats.pending"></span></h2>
                <small class="text-danger fw-bold mt-3 d-flex align-items-center gap-1" style="font-size: 0.85rem;">
                    <i class="bi bi-exclamation-circle-fill"></i> Action Required
                </small>
            </div>
        </div>
        
        <!-- Expenses -->
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between mb-3">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.75rem;">Expenses (Dec)</small>
                    <div class="icon-circle bg-orange-soft"><i class="bi bi-people-fill"></i></div>
                </div>
                <h2 class="fw-bold mb-0">₹<span x-text="stats.expenses"></span></h2>
                <small class="text-muted mt-3 d-block" style="font-size: 0.85rem;">Major: Security</small>
            </div>
        </div>
        
        <!-- Cash in Hand -->
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between mb-3">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.75rem;">Cash in Hand</small>
                    <div class="icon-circle bg-blue-soft"><i class="bi bi-wallet2"></i></div>
                </div>
                <h2 class="fw-bold mb-0">₹<span x-text="stats.cashInHand"></span></h2>
                <a href="#" class="mt-3 d-block text-decoration-none small fw-bold">View Bank Details</a>
            </div>
        </div>
    </div>
</div>

<script>
    function dashboardController() {
        return {
            // currentDate is now inherited from baseof.html appData()
            stats: {
                collected: "18,150",
                pending: "29,550",
                expenses: "41,000",
                cashInHand: "-22,850"
            }
        }
    }
</script>
{{ end }}
