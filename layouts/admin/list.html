{{ define "main" }}

<h1 class="mb-4 text-center">Flats Directory</h1>

<!-- ============================= -->
<!-- MAIN FLATS TABLE -->
<!-- ============================= -->
<div class="table-responsive">
<table class="table table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>Flat</th>
            <th>Floor</th>
            <th>Tower</th>
            <th class="text-center">Actions</th>
        </tr>
    </thead>

    <tbody id="flats-body">
        <tr><td colspan="4" class="p-4 text-center">Loading flats...</td></tr>
    </tbody>
</table>
</div>


<!-- ============================= -->
<!-- TEMPLATE: FLAT ROW -->
<!-- ============================= -->
<template id="tpl-flat-row">
<tr>
    <td class="col-flat-no fw-bold"></td>
    <td class="col-floor"></td>
    <td class="col-tower"></td>
    <td class="text-center">
        <button class="btn btn-sm btn-primary btn-view">View</button>
    </td>
</tr>
</template>


<!-- ============================= -->
<!-- TEMPLATE: DETAILS ROW WRAPPER -->
<!-- ============================= -->
<template id="tpl-detail-row">
<tr class="details-row bg-light d-none">
    <td colspan="4">
        <div class="p-3 detail-container">Loading...</div>
    </td>
</tr>
</template>


<!-- ============================= -->
<!-- TEMPLATE: DETAILS BLOCK -->
<!-- ============================= -->
<template id="tpl-detail-container">
<div class="detail-root">

    <!-- Header -->
    <h5 class="detail-flat-title"></h5>

    <!-- Basic details -->
    <p><strong>Floor:</strong> <span class="detail-floor"></span></p>
    <p><strong>Tower:</strong> <span class="detail-tower"></span></p>

    <hr>

    <!-- Residents Section -->
    <h6>Residents</h6>
    <ul class="list-group mb-3 detail-residents"></ul>

    <hr>

    <!-- Payments Section -->
    <h6>Maintenance (Last 6 Months)</h6>

    <div class="table-responsive">
    <table class="table table-sm table-bordered">
        <thead class="table-secondary">
            <tr>
                <th>Month</th>
                <th>Status</th>
                <th>Paid On</th>
                <th>Amount</th>
                <th>Mode</th>
            </tr>
        </thead>
        <tbody class="detail-payments"></tbody>
    </table>
    </div>

</div>
</template>


<!-- ============================= -->
<!-- TEMPLATE: RESIDENT ITEM -->
<!-- ============================= -->
<template id="tpl-resident-item">
<li class="list-group-item">
    <strong class="resident-type"></strong>:
    <span class="resident-name"></span><br>
    📞 <a class="resident-phone"></a><br>
    ✉️ <a class="resident-email"></a>
</li>
</template>


<!-- ============================= -->
<!-- TEMPLATE: PAYMENT ROW -->
<!-- ============================= -->
<template id="tpl-payment-row">
<tr>
    <td class="pay-month"></td>
    <td class="pay-status"></td>
    <td class="pay-paidon"></td>
    <td class="pay-amount"></td>
    <td class="pay-mode"></td>
</tr>
</template>


<!-- ============================= -->
<!-- TEMPLATE: NO DATA -->
<!-- ============================= -->
<template id="tpl-no-data">
<p class="text-muted">No data available</p>
</template>


<!-- ============================= -->
<!-- Inject API from hugo.toml -->
<!-- ============================= -->
<script>
  window.HUGO_API_BASE = "{{ .Site.Params.apiBase }}";
</script>

<!-- Load JS -->
<script src="/js/data-loader.js"></script>

{{ end }}
