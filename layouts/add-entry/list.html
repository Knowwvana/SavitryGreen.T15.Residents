{{ define "main" }}

<!-- Modal Overlay Style Wrapper -->
<!-- We use position: fixed to cover the entire screen (including sidebar) to create the focused 'modal' look -->
<div class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center page-animate" 
     style="background-color: rgba(0, 0, 0, 0.6); z-index: 2000; backdrop-filter: blur(4px);">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5">
                
                <!-- Main Card -->
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    
                    <!-- Card Header -->
                    <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0 d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="fw-bold mb-1">New Transaction</h5>
                            <p class="text-muted small mb-0">Record maintenance or expense</p>
                        </div>
                        <!-- Close X Button -->
                        <button type="button" class="btn-close" onclick="window.history.back()" aria-label="Close"></button>
                    </div>

                    <div class="card-body p-4">
                        
                        <!-- Progress Bar (Thicker and Animated) -->
                        <div class="progress mb-4" style="height: 10px; display: none;" x-show="isSubmitting || progress > 0" :style="{ display: (isSubmitting || progress > 0) ? 'flex' : 'none' }">
                            <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" role="progressbar" :style="`width: ${progress}%`"></div>
                        </div>

                        <!-- Success Alert -->
                        <div x-show="showSuccessMessage" style="display: none;" class="alert alert-success mb-4 py-2" role="alert" x-transition.opacity>
                            <div class="d-flex align-items-center">
                                <i class="bi bi-check-circle-fill me-2"></i>
                                <div class="small fw-medium">Success! Entry recorded.</div>
                            </div>
                        </div>

                        <!-- Error Alert -->
                        <div x-show="error" style="display: none;" class="alert alert-danger mb-4 py-2 small" x-text="error"></div>

                        <!-- FORM -->
                        <form @submit.prevent="submitMaintenanceEntry">
                            
                            <div class="row g-3 mb-3">
                                <!-- Flat Selection -->
                                <div class="col-md-6">
                                    <label class="form-label form-label-sm text-muted fw-bold">Flat Number</label>
                                    <select class="form-select form-select-sm bg-light border-0" x-model="maintenanceFormData.FlatNo" required :disabled="isSubmitting || isLoading">
                                        <!-- Dynamic Placeholder based on loading state -->
                                        <option value="" disabled selected x-text="isLoading ? 'Please wait loading flats...' : 'Select Flat'"></option>
                                        <template x-for="flat in flats" :key="flat.FlatNo">
                                            <option :value="flat.FlatNo" x-text="flat.FlatNo + ' - ' + flat.primaryName"></option>
                                        </template>
                                    </select>
                                </div>

                                <!-- Amount -->
                                <div class="col-md-6">
                                    <label class="form-label form-label-sm text-muted fw-bold">Amount (₹)</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-light border-0 text-muted">₹</span>
                                        <input type="number" class="form-control form-control-sm bg-light border-0" x-model="maintenanceFormData.Amount" placeholder="0.00" required :disabled="isSubmitting">
                                    </div>
                                </div>

                                <!-- Category -->
                                <div class="col-md-6">
                                    <label class="form-label form-label-sm text-muted fw-bold">Category</label>
                                    <select class="form-select form-select-sm bg-light border-0" x-model="maintenanceFormData.Category" :disabled="isSubmitting">
                                        <option value="Monthly">Monthly Maintenance</option>
                                        <option value="Adhoc">Adhoc / One-time</option>
                                    </select>
                                </div>

                                <!-- Dynamic Field: Month (if Monthly) OR Title (if Adhoc) -->
                                <div class="col-md-6">
                                    <template x-if="maintenanceFormData.Category === 'Monthly'">
                                        <div>
                                            <label class="form-label form-label-sm text-muted fw-bold">For Month</label>
                                            <input type="month" class="form-control form-control-sm bg-light border-0" x-model="maintenanceFormData.Month" :disabled="isSubmitting">
                                        </div>
                                    </template>
                                    <template x-if="maintenanceFormData.Category === 'Adhoc'">
                                        <div>
                                            <label class="form-label form-label-sm text-muted fw-bold">Title</label>
                                            <input type="text" class="form-control form-control-sm bg-light border-0" x-model="maintenanceFormData.Title" placeholder="e.g. Festival Fund" required :disabled="isSubmitting">
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <!-- Payment Date -->
                                <div class="col-md-6">
                                    <label class="form-label form-label-sm text-muted fw-bold">Date Received</label>
                                    <input type="date" class="form-control form-control-sm bg-light border-0" x-model="maintenanceFormData.PaymentDate" :disabled="isSubmitting">
                                </div>

                                <!-- Payment Method -->
                                <div class="col-md-6">
                                    <label class="form-label form-label-sm text-muted fw-bold">Mode</label>
                                    <select class="form-select form-select-sm bg-light border-0" x-model="maintenanceFormData.PaymentMethod" :disabled="isSubmitting">
                                        <option value="UPI">UPI / GPay</option>
                                        <option value="Cash">Cash</option>
                                        <option value="NEFT">NEFT / IMPS</option>
                                        <option value="Cheque">Cheque</option>
                                    </select>
                                </div>

                                <!-- Remarks -->
                                <div class="col-12">
                                    <label class="form-label form-label-sm text-muted fw-bold">Remarks</label>
                                    <input type="text" class="form-control form-control-sm bg-light border-0" x-model="maintenanceFormData.Remarks" placeholder="Transaction ID or notes..." :disabled="isSubmitting">
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary fw-medium py-2" :disabled="isSubmitting || showSuccessMessage">
                                    <!-- Default State -->
                                    <span x-show="!isSubmitting && !showSuccessMessage">Save Entry</span>
                                    
                                    <!-- Processing State: Only show if submitting AND success is NOT yet shown -->
                                    <span x-show="isSubmitting && !showSuccessMessage" style="display: none;">Processing...</span>
                                    
                                    <!-- Success State: Show immediately when success message triggers -->
                                    <span x-show="showSuccessMessage" style="display: none;"><i class="bi bi-check-lg me-1"></i> Saved</span>
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <!-- Footer Link -->
                    <div class="card-footer bg-light border-0 text-center py-3">
                        <a href="javascript:void(0)" onclick="window.history.back()" class="text-decoration-none small text-muted">Cancel and go back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{{ end }}
