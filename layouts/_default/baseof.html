<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Params.society_name }}</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link href="{{ "css/style.css" | relURL }}" rel="stylesheet">
</head>

<!-- Bind class to state for CSS styling -->
<body x-data="maintenanceApp" :class="{ 'sidebar-collapsed': sidebarCollapsed, 'sidebar-open': mobileSidebarOpen }">
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar-wrapper">
            {{ partial "sidebar.html" . }}
        </div>

        <!-- Mobile Overlay for closing sidebar -->
        <div x-show="mobileSidebarOpen" @click="mobileSidebarOpen = false" 
             style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none;"
             :style="{ display: mobileSidebarOpen ? 'block' : 'none' }"
             class="d-md-none"></div>

        <!-- Main Content -->
        <main class="content-wrapper">
            <!-- Mobile Header Trigger -->
            <div class="d-md-none mb-3 d-flex align-items-center justify-content-between">
                <button class="btn btn-light border" @click="mobileSidebarOpen = true"><i class="bi bi-list fs-4"></i></button>
                <h5 class="m-0 fw-bold">{{ .Site.Params.society_name }}</h5>
                <div style="width: 40px;"></div> <!-- Spacer -->
            </div>

            <!-- Global Header -->
            <div class="d-none d-md-block">
                {{ partial "header.html" . }}
            </div>
            
            <!-- Page Content -->
            {{ block "main" . }}{{ end }}
        </main>
    </div>

    <!-- CONFIGURATION: PASTE YOUR GOOGLE SCRIPT URL BELOW -->
    <script>
       window.API_URL = "{{ .Site.Params.api_url }}";
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js" defer></script>
    <!-- Load the Main App Logic -->
    <script src="{{ "js/app.js" | relURL }}"></script>
</body>
</html>
